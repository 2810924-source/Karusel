<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prodaja farbe za zid</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items:start;
            min-height: 100vh;
            margin-top: 5%;
            
        }

        
        @media (min-width: 1001px) {
            .carousel-container {
                width: 600px !important; 
                height: 600px !important;
            }
            .carousel-inner, .carousel-item {
                height: 600px !important;
            }
            .carousel-item img {
                height: 600px !important;
                width: 600px !important;
            }
        }

        
        @media (max-width: 1000px) {
            .carousel-container {
                width: 500px !important; 
                height: 500px !important;
            }
            .carousel-inner, .carousel-item {
                height: 500px !important;
            }
            .carousel-item img {
                height: 500px !important;
                width: 500px !important;
            }
        }
		@media (max-width: 750px) {
            .carousel-container {
                width: 400px !important; 
                height: 400px !important;
            }
            .carousel-inner, .carousel-item {
                height: 400px !important;
            }
            .carousel-item img {
                height: 400px !important;
                width: 400px !important;
            }
        }

       
        .carousel-item img {
            object-fit: cover; 
            border-radius: 8px;
        }

        
        .carousel-container {
            flex-shrink: 0; 
        }
    </style>
</head>
<body>
    <div class="carousel-container">
        <h1 id = "Naslov">
        Narucite farbu za vas zid
        </h1>
        <div id="carouselExample" class="carousel slide" data-bs-ride="carousel" data-bs-interval="4000">
            
            <div class="carousel-indicators">
                <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="0" class="active"></button>
                <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="1"></button>
                <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="2"></button>
				<button type="button" data-bs-target="#carouselExample" data-bs-slide-to="3"></button>
				<button type="button" data-bs-target="#carouselExample" data-bs-slide-to="4"></button>
                <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="5"></button>
                <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="6"></button>
                <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="7"></button>
                <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="8"></button>
                <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="9"></button>
            </div>

            <div class="carousel-inner shadow-lg">
                <div class="carousel-item active">
                    <img src="Slika1.png" class="d-block" alt="Slika 1">
                    <div class="carousel-caption d-none d-md-block">
					<h5>Light Moon</h5>
                        
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="Slika2.png" class="d-block" alt="Slika 2">
                    <div class="carousel-caption d-none d-md-block">
                       <h5>Macchiato</h5>
                        
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="Slika3.png" class="d-block" alt="Slika 3">
                    <div class="carousel-caption d-none d-md-block">
                       <h5>Cinnamon</h5>
                        
                    </div>
                </div>
				<div class="carousel-item">
                    <img src="Slika5.png" class="d-block" alt="Slika 4">
                    <div class="carousel-caption d-none d-md-block">
                       <h5>Black Rose</h5>
                        
                    </div>
                </div>
				<div class="carousel-item">
                    <img src="Slika4.png" class="d-block" alt="Slika 5">
                    <div class="carousel-caption d-none d-md-block">
                       <h5>Moody Green</h5>
                        
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="Slika6.png" class="d-block" alt="Slika 5">
                    <div class="carousel-caption d-none d-md-block">
                       <h5>Baby Blue</h5>
                        
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="Slika7.png" class="d-block" alt="Slika 5">
                    <div class="carousel-caption d-none d-md-block">
                       <h5>Quartz</h5>
                        
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="Slika8.png" class="d-block" alt="Slika 5">
                    <div class="carousel-caption d-none d-md-block">
                       <h5>Salmon</h5>
                        
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="Slika9.png" class="d-block" alt="Slika 5">
                    <div class="carousel-caption d-none d-md-block">
                       <h5>Origami</h5>
                        
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="Slika10.png" class="d-block" alt="Slika 5">
                    <div class="carousel-caption d-none d-md-block">
                       <h5>Olive</h5>
                        
                    </div>
                </div>
            </div>

            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Prethodna</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Sledeća</span>
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
